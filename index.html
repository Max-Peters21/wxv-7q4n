<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0d10" />
    <meta name="robots" content="noindex, nofollow, noarchive" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Fast Radar" />
    <title>Fast Radar</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main id="app" aria-label="Fast weather radar">
      <div id="map" aria-label="Radar map">
        <canvas id="basemap" aria-hidden="true"></canvas>
        <div id="radar"></div>
      </div>

      <section class="topbar" aria-label="Radar status">
        <div>
          <p class="eyebrow">NOAA MRMS</p>
          <h1>Fast Radar</h1>
        </div>
        <div class="status" id="status">Starting</div>
      </section>

      <section class="controls" aria-label="Radar controls">
        <button id="zoomInBtn" type="button" title="Zoom in" aria-label="Zoom in">
          <span>+</span>
        </button>
        <button id="zoomOutBtn" type="button" title="Zoom out" aria-label="Zoom out">
          <span>-</span>
        </button>
        <button id="locateBtn" type="button" title="Use my location" aria-label="Use my location">
          <span>⌖</span>
        </button>
        <button id="refreshBtn" type="button" title="Refresh radar" aria-label="Refresh radar">
          <span>↻</span>
        </button>
        <button id="playBtn" type="button" title="Play radar loop" aria-label="Play radar loop">
          <span>▶</span>
        </button>
        <label class="opacity">
          <span>Radar</span>
          <input id="opacitySlider" type="range" min="20" max="100" value="86" />
        </label>
      </section>

      <section class="readout" aria-label="Radar details">
        <span id="timestamp">Latest radar</span>
        <span id="latency">No frame yet</span>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
